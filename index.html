<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h1>Devboard Hiring</h1>
    </header>

    <main>
      <aside id="filter-panel">
        <h2>Filters</h2>

        <input type="text" id="search-input" placeholder="Search jobs..." />

        <div id="tag-filters"></div>

        <button id="clear-filters">Clear Filters</button>
      </aside>

      <section id="job-section">
        <div id="tabs">
          <button data-tab="all">All Jobs</button>

          <button data-tab="saved">Saved</button>

          <button data-tab="applied">Applied</button>
        </div>

        <div id="job-list"></div>
      </section>
    </main>
    <script src="./js/utils.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/search.js"></script>
    <script src="./js/filters.js"></script>
    <script src="./js/tabs.js"></script>
    <script src="./js/components.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
